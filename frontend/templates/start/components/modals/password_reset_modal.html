<div id="passwordResetModal" class="modal hidden">
    <div class="modal-box password-reset-modal-box">
        <button type="button" class="modal-close">×</button>

        <h2>비밀번호 찾기</h2>

        <form class="password-reset-form">
            <div class="password-reset-field">
                <label for="newPasswordDisplay">새 비밀번호</label>

                <div class="reset-password-field">
                    <input type="hidden" id="newPasswordReal" name="newPassword">

                    <input
                        id="newPasswordDisplay"
                        type="text"
                        placeholder="새 비밀번호를 입력해주세요."
                        autocomplete="off"
                    >

                    <button
                        type="button"
                        id="newPasswordToggle"
                        class="reset-password-toggle"
                        aria-label="새 비밀번호 보기 전환"
                    >
                        {% include "start/components/icons/eye_off.html" with icon_class="reset-eye-icon" state_class="reset-eye-off active" %}
                        {% include "start/components/icons/eye_open.html" with icon_class="reset-eye-icon" state_class="reset-eye-open" %}
                        {% include "start/components/icons/check_icon.html" with icon_class="reset-check-icon" %}
                    </button>
                </div>

                <p id="newPasswordRuleMessage" class="password-rule-message">
                    * 10자~16자 / 영문 대소문자, 숫자 필수 포함 / 공백 미포함
                </p>
            </div>

            <div class="password-reset-field">
                <label for="newPasswordCheckDisplay">새 비밀번호 확인</label>

                <div class="reset-password-field">
                    <input type="hidden" id="newPasswordCheckReal" name="newPasswordCheck">

                    <input
                        id="newPasswordCheckDisplay"
                        type="text"
                        placeholder="새 비밀번호를 다시 입력해주세요."
                        autocomplete="off"
                    >

                    <button
                        type="button"
                        id="newPasswordCheckToggle"
                        class="reset-password-toggle"
                        aria-label="새 비밀번호 확인 보기 전환"
                    >
                        {% include "start/components/icons/eye_off.html" with icon_class="reset-eye-icon" state_class="reset-eye-off active" %}
                        {% include "start/components/icons/eye_open.html" with icon_class="reset-eye-icon" state_class="reset-eye-open" %}
                        {% include "start/components/icons/check_icon.html" with icon_class="reset-check-icon" %}
                    </button>
                </div>

                <p id="newPasswordMatchError" class="input-error hidden">
                    × 비밀번호가 일치하지 않습니다.
                </p>
            </div>

            <button type="button" id="passwordResetConfirmBtn" class="password-reset-confirm-btn">
                확인
            </button>
        </form>
    </div>
</div>
