<div id="passwordEmailModal" class="modal hidden">
    <div class="modal-box password-find-modal-box">
        <button type="button" class="modal-close">×</button>

        <h2>비밀번호 찾기</h2>

        <form class="password-find-form">
            <div class="password-find-field">
                <label for="resetEmailInput">이메일</label>

                <div class="password-email-row">
                    <input
                        type="text"
                        id="resetEmailInput"
                        name="resetEmail"
                        placeholder="이메일 주소를 입력해주세요."
                        autocomplete="email"
                    >

                    <button type="button" id="resetEmailSendBtn" class="send-code-btn">
                        전송
                    </button>
                </div>

                <p id="resetEmailError" class="input-error hidden">
                    × 잘못된 이메일 양식입니다.
                </p>

                <p id="resetEmailSuccess" class="input-success hidden">
                    {% include "start/components/icons/paper_plane.html" with icon_class="paper-plane-icon" %}
                    인증코드를 전송하였습니다.
                </p>
            </div>

            <div class="password-find-field">
                <label for="resetCodeInput">인증코드</label>

                <div class="reset-code-box">
                    <input
                        type="text"
                        id="resetCodeInput"
                        name="resetCode"
                        placeholder="인증코드를 입력해주세요."
                        autocomplete="off"
                    >

                    <span id="resetCodeTimer" class="code-timer hidden">3:00</span>
                </div>

                <p id="resetCodeError" class="input-error hidden">
                    × 인증코드가 일치하지 않습니다.
                </p>

                <p id="resetCodeExpiredError" class="input-error hidden">
                    × 인증코드가 만료되었습니다.
                </p>
            </div>

            <button type="button" id="resetConfirmBtn" class="password-find-confirm-btn">
                확인
            </button>
        </form>
    </div>
</div>
