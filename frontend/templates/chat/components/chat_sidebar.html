{% load static %}

<aside class="chat-sidebar" id="chatSidebar">
    <div class="sidebar-top">
        <img src="{% static 'img/logo.png' %}" alt="For everyOne 로고" class="sidebar-logo">

        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="사이드바 열기/닫기">
            <svg class="sidebar-toggle-svg" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3.5" y="4" width="17" height="16" rx="2.5"></rect>
                <line x1="11.5" y1="4" x2="11.5" y2="20"></line>
            </svg>
        </button>
    </div>

    <button type="button" class="new-chat-btn" id="newChatBtn">
        <span class="plus-circle">＋</span>
        <span class="new-chat-text">New Chat</span>
    </button>

    <section class="history-section">
        <div class="history-header">
            <h2>History</h2>

            <button type="button" class="history-more-btn" id="historyMoreBtn" aria-label="대화 기록 관리">
                ⋮
            </button>

            <button type="button" class="history-delete-btn hidden" id="historyDeleteBtn" aria-label="선택 기록 삭제">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7H20"></path>
                    <path d="M10 11V17"></path>
                    <path d="M14 11V17"></path>
                    <path d="M6 7L7 21H17L18 7"></path>
                    <path d="M9 7V4H15V7"></path>
                </svg>
            </button>
        </div>

        <ul class="history-list" id="historyList">
            <li>
                <button type="button" class="history-title">지금 시즌 1위 드라이버가 DRS...</button>
                <input type="checkbox" class="history-check">
            </li>
            <li>
                <button type="button" class="history-title">DRS가 뭐야?</button>
                <input type="checkbox" class="history-check">
            </li>
            <li>
                <button type="button" class="history-title">소니 헤이즈가 누구야?</button>
                <input type="checkbox" class="history-check">
            </li>
            <li>
                <button type="button" class="history-title">점심 메뉴 추천해 줘</button>
                <input type="checkbox" class="history-check">
            </li>
        </ul>
    </section>

    <div class="sidebar-bottom">
        <div class="user-info">
            <div class="user-avatar"></div>

            <span class="user-email">
                {% if request.user.is_authenticated %}
                    {{ request.user.email|default:request.user.username }}
                {% else %}
                    Admin
                {% endif %}
            </span>
        </div>

        <button type="button" class="settings-btn" id="settingsBtn" aria-label="설정">
            ⚙
        </button>

        {% include "chat/components/chat_settings_panel.html" %}
    </div>
</aside>
