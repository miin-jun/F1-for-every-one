<div id="passwordChangeModal" class="chat-modal hidden">
    <div class="chat-modal-box password-change-modal-box">
        <button type="button" class="chat-modal-close" id="passwordChangeCloseBtn" aria-label="비밀번호 변경 모달 닫기">
            ×
        </button>

        <h2>비밀번호 변경</h2>

        <form class="password-change-form">
            <div class="password-change-field">
                <label for="currentPasswordInput">현재 비밀번호</label>

                <div class="password-change-input-row" id="currentPasswordRow">
                    <input
                        type="password"
                        id="currentPasswordInput"
                        name="currentPassword"
                        placeholder="현재 비밀번호를 입력해주세요."
                        autocomplete="current-password"
                    >

                    <button type="button" id="currentPasswordCheckBtn" class="current-password-check-btn">
                        확인
                    </button>

                    <span id="currentPasswordSuccessIcon" class="password-status-icon hidden" aria-hidden="true">
                        {% include "chat/components/icons/check_circle.html" %}
                    </span>
                </div>

                <p id="currentPasswordError" class="password-change-error hidden">
                    × 비밀번호가 일치하지 않습니다.
                </p>
            </div>

            <div class="password-change-field">
                <label for="changeNewPasswordInput">새 비밀번호</label>

                <div class="password-change-input-row" id="changeNewPasswordRow">
                    <input
                        type="password"
                        id="changeNewPasswordInput"
                        name="newPassword"
                        placeholder="새 비밀번호를 입력해주세요."
                        autocomplete="new-password"
                    >

                    <button type="button" id="changeNewPasswordToggle" class="password-visibility-btn" aria-label="새 비밀번호 보기 전환">
                        {% include "chat/components/icons/eye_off.html" %}
                        {% include "chat/components/icons/eye_open.html" %}
                        {% include "chat/components/icons/check_circle.html" with extra_class="password-match-check" %}
                    </button>
                </div>

                <p id="changePasswordRuleMessage" class="password-rule-message">
                    * 10자~16자 / 영문 대소문자, 숫자 필수 포함 / 공백 미포함
                </p>
            </div>

            <div class="password-change-field">
                <label for="changeNewPasswordCheckInput">새 비밀번호 확인</label>

                <div class="password-change-input-row" id="changeNewPasswordCheckRow">
                    <input
                        type="password"
                        id="changeNewPasswordCheckInput"
                        name="newPasswordCheck"
                        placeholder="새 비밀번호를 다시 입력해주세요."
                        autocomplete="new-password"
                    >

                    <button type="button" id="changeNewPasswordCheckToggle" class="password-visibility-btn" aria-label="새 비밀번호 확인 보기 전환">
                        {% include "chat/components/icons/eye_off.html" %}
                        {% include "chat/components/icons/eye_open.html" %}
                        {% include "chat/components/icons/check_circle.html" with extra_class="password-match-check" %}
                    </button>
                </div>

                <p id="changePasswordMatchError" class="password-change-error hidden">
                    × 비밀번호가 일치하지 않습니다.
                </p>
            </div>

            <button type="button" id="passwordChangeSubmitBtn" class="password-change-submit-btn">
                확인
            </button>
        </form>
    </div>
</div>
