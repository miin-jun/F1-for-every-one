{% extends "base.html" %}
{% load static %}

{% block title %}회원 탈퇴 완료{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/withdraw.css' %}">
{% endblock %}

{% block content %}
<div class="withdraw-complete-page">
    <a href="{% url 'front:index' %}" class="withdraw-complete-logo-link">
        <img src="{% static 'img/logo.png' %}" alt="For everyOne 로고" class="withdraw-complete-logo">
    </a>

    {% include "withdraw/components/withdraw_complete_content.html" %}

    <p class="withdraw-complete-redirect-text">
        잠시 후 시작 페이지로 이동합니다.
    </p>
</div>
{% endblock %}

{% block extra_js %}
<script>
    setTimeout(function () {
        window.location.href = "{% url 'front:index' %}";
    }, 5000);
</script>
{% endblock %}
