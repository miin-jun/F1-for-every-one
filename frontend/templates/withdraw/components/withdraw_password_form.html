<section class="withdraw-form-section">
    <form class="withdraw-form" id="withdrawForm">
        <div class="withdraw-field">
            <label for="withdrawPassword">현재 비밀번호</label>

            <div class="withdraw-input-row" id="withdrawPasswordRow">
                <input
                    type="password"
                    id="withdrawPassword"
                    placeholder="현재 비밀번호를 입력해주세요."
                    autocomplete="current-password"
                >

                <button type="button" class="withdraw-eye-btn" id="withdrawPasswordToggle" aria-label="비밀번호 보기">
                    <svg class="withdraw-eye eye-off active" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M3 3L21 21"></path>
                        <path d="M10.6 10.6A2 2 0 0 0 13.4 13.4"></path>
                        <path d="M9.4 5.3A9.7 9.7 0 0 1 12 5C17 5 21.3 8.1 23 12C22.4 13.4 21.5 14.7 20.4 15.8"></path>
                        <path d="M6.1 6.1C3.8 7.4 2 9.5 1 12C2.7 15.9 7 19 12 19C13.4 19 14.8 18.8 16 18.3"></path>
                    </svg>

                    <svg class="withdraw-eye eye-open" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M1 12C2.7 8.1 7 5 12 5C17 5 21.3 8.1 23 12C21.3 15.9 17 19 12 19C7 19 2.7 15.9 1 12Z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>

            <p class="withdraw-error hidden" id="withdrawPasswordError">
                비밀번호가 일치하지 않습니다.
            </p>
        </div>

        <button type="submit" class="withdraw-next-btn">
            다음
        </button>
    </form>
</section>
