services:
  web:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: django_web
    volumes:
      - .:/code
    env_file:
      - .env
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/code/static
    depends_on:
      - web
      - model_server

  model_server:
    build:
      context: .
      dockerfile: model_server.Dockerfile
    container_name: fastapi_model
    expose:
      - "8001"